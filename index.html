<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halāl Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Leaflet MarkerCluster CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: rgba(201,168,76,0.12);
    --gold-border: rgba(201,168,76,0.3);
    --ink: #0F0E0C;
    --ink-2: #1A1916;
    --ink-3: #242220;
    --cream: #FAF7F2;
    --muted: #7A7265;
    --muted-2: rgba(250,247,242,0.5);
    --green: #7EC8A4;
    --red: #C87E7E;
    --panel-w: 380px;
    --radius: 10px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--cream);
  }

  /* ─── LAYOUT ─── */
  #app { display: flex; height: 100vh; }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: var(--panel-w);
    min-width: var(--panel-w);
    height: 100%;
    background: var(--ink-2);
    border-right: 1px solid var(--gold-border);
    display: flex;
    flex-direction: column;
    z-index: 1000;
    position: relative;
  }

  /* Header */
  #sidebar-header {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--gold-border);
    background: var(--ink);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--cream);
  }
  .logo em { color: var(--gold); font-style: italic; }

  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Search */
  #search-wrap {
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .search-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #search-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    background: var(--ink-3);
    border: 1px solid var(--gold-border);
    border-radius: 6px;
    color: var(--cream);
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search-input::placeholder { color: var(--muted); }
  #search-input:focus { border-color: var(--gold); }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 13px;
    border-radius: 6px;
    border: 1px solid var(--gold-border);
    background: var(--gold-dim);
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(201,168,76,0.22); border-color: var(--gold); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
    font-weight: 600;
  }
  .btn.primary:hover { background: var(--gold-light); }

  #locate-btn {
    padding: 8px 10px;
    font-size: 14px;
    letter-spacing: 0;
  }

  /* Radius slider */
  #radius-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  #radius-row label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  #radius-val {
    font-size: 11px;
    color: var(--gold-light);
    min-width: 40px;
    text-align: right;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--ink-3);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: 2px solid var(--ink);
  }

  /* Filters */
  #filters-wrap {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }
  #filters-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  #filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-chip {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.04em;
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid var(--gold-border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-chip.active, .filter-chip:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Status bar */
  #status-bar {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.loading { background: var(--gold); animation: blink 1s infinite; }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Results list */
  #results {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #results::-webkit-scrollbar { width: 4px; }
  #results::-webkit-scrollbar-track { background: transparent; }
  #results::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

  .result-item {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.06);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .result-item:hover { background: rgba(201,168,76,0.05); }
  .result-item.active {
    background: var(--gold-dim);
    border-left: 3px solid var(--gold);
    padding-left: 13px;
  }

  .result-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.2;
  }

  .result-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
    background: rgba(255,255,255,0.03);
  }
  .tag.halal { color: var(--gold); border-color: var(--gold-border); background: var(--gold-dim); }
  .tag.open { color: var(--green); border-color: rgba(126,200,164,0.3); background: rgba(126,200,164,0.08); }
  .tag.closed { color: var(--red); border-color: rgba(200,126,126,0.3); background: rgba(200,126,126,0.08); }

  .result-addr {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }

  .result-dist {
    position: absolute;
    right: 14px;
    top: 14px;
    font-size: 11px;
    color: var(--muted);
  }

  /* Empty state */
  #empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 20px;
    gap: 8px;
  }
  #empty-state .icon { font-size: 32px; opacity: 0.3; }

  /* Footer */
  #sidebar-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--gold-border);
    font-size: 10px;
    color: rgba(122,114,101,0.5);
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ─── MAP ─── */
  #map {
    flex: 1;
    height: 100%;
    background: var(--ink);
    z-index: 1;
  }

  /* Leaflet dark overrides */
  .leaflet-container { background: #0F0E0C; font-family: 'DM Sans', sans-serif; }
  .leaflet-tile { filter: brightness(0.75) saturate(0.7) hue-rotate(10deg); }
  .leaflet-control-zoom a {
    background: var(--ink-2) !important;
    color: var(--cream) !important;
    border-color: var(--gold-border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--ink-3) !important; }
  .leaflet-control-attribution {
    background: rgba(15,14,12,0.8) !important;
    color: var(--muted) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--gold) !important; }

  /* Custom popup */
  .leaflet-popup-content-wrapper {
    background: var(--ink-2) !important;
    border: 1px solid var(--gold-border) !important;
    border-radius: var(--radius) !important;
    color: var(--cream) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
  }
  .leaflet-popup-tip { background: var(--ink-2) !important; }
  .leaflet-popup-content { margin: 0 !important; }
  .leaflet-popup-close-button {
    color: var(--muted) !important;
    font-size: 18px !important;
    top: 8px !important;
    right: 10px !important;
  }
  .leaflet-popup-close-button:hover { color: var(--cream) !important; }

  /* Cluster styles */
  .marker-cluster-small,
  .marker-cluster-medium,
  .marker-cluster-large {
    background-color: rgba(201,168,76,0.25) !important;
  }
  .marker-cluster-small div,
  .marker-cluster-medium div,
  .marker-cluster-large div {
    background-color: rgba(201,168,76,0.6) !important;
    color: var(--ink) !important;
    font-family: 'DM Sans', sans-serif !important;
    font-weight: 600 !important;
  }

  /* Popup content */
  .popup-inner { padding: 16px 18px; min-width: 240px; max-width: 300px; }
  .popup-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.2;
    padding-right: 20px;
  }
  .popup-halal {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    border-radius: 4px;
    padding: 2px 8px;
    margin-top: 6px;
  }
  .popup-divider { height: 1px; background: var(--gold-border); margin: 10px 0; opacity: 0.5; }
  .popup-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .popup-row .icon { flex-shrink: 0; margin-top: 1px; }
  .popup-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .popup-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 13px;
    border-radius: 5px;
    border: 1px solid var(--gold-border);
    background: var(--gold-dim);
    color: var(--gold-light);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .popup-btn:hover { background: rgba(201,168,76,0.22); }

  /* Mobile toggle */
  #toggle-sidebar {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
    padding: 10px 22px;
    border-radius: 50px;
    background: var(--ink-2);
    border: 1px solid var(--gold-border);
    color: var(--gold-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  @media (max-width: 700px) {
    #sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 1500;
    }
    #sidebar.open { transform: translateX(0); }
    #toggle-sidebar { display: block; }
  }

  /* Loading overlay */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.5s;
  }
  #loading-overlay.hide { opacity: 0; pointer-events: none; }

  .loading-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.04em;
  }
  .loading-logo em { color: var(--gold); font-style: italic; }
  .loading-bar {
    width: 120px;
    height: 2px;
    background: var(--ink-3);
    border-radius: 1px;
    overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 1px;
    animation: load 1.5s ease-in-out infinite;
  }
  @keyframes load {
    0% { width: 0; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0; margin-left: 120px; }
  }
  .loading-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loading-logo">Halāl <em>Map</em></div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-sub">Initialising…</div>
</div>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">Halāl <em>Map</em></div>
      <div class="logo-sub">Live halal food finder · OpenStreetMap</div>
    </div>

    <div id="search-wrap">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search area, city or postcode…" />
        <button class="btn primary" id="search-btn" onclick="searchArea()">Go</button>
        <button class="btn" id="locate-btn" onclick="locateMe()" title="Use my location">📍</button>
      </div>
      <div id="radius-row">
        <label>Radius</label>
        <input type="range" id="radius-slider" min="500" max="5000" step="250" value="1500" oninput="updateRadius(this.value)" />
        <span id="radius-val">1.5 km</span>
      </div>
    </div>

    <div id="filters-wrap">
      <div id="filters-label">Filter by cuisine</div>
      <div id="filters">
        <button class="filter-chip active" data-cuisine="all" onclick="setFilter(this)">All</button>
        <button class="filter-chip" data-cuisine="indian" onclick="setFilter(this)">Indian</button>
        <button class="filter-chip" data-cuisine="turkish" onclick="setFilter(this)">Turkish</button>
        <button class="filter-chip" data-cuisine="lebanese" onclick="setFilter(this)">Lebanese</button>
        <button class="filter-chip" data-cuisine="pakistani" onclick="setFilter(this)">Pakistani</button>
        <button class="filter-chip" data-cuisine="arabic" onclick="setFilter(this)">Arabic</button>
        <button class="filter-chip" data-cuisine="chinese" onclick="setFilter(this)">Chinese</button>
        <button class="filter-chip" data-cuisine="other" onclick="setFilter(this)">Other</button>
      </div>
    </div>

    <div id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready — search an area or use your location</span>
    </div>

    <div id="results"></div>
    <div id="empty-state">
      <div class="icon">🕌</div>
      <div>No results found</div>
      <div style="font-size:11px;color:var(--muted)">Try a wider radius or different area</div>
    </div>

    <div id="sidebar-footer">
      <span>Data © OpenStreetMap contributors</span>
      <span id="count-label">–</span>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<button id="toggle-sidebar" onclick="toggleSidebar()">☰ Results</button>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const OVERPASS_URL = 'https://overpass-api.de/api/interpreter';
let searchRadius = 1500;
let activeFilter = 'all';
let markers = [];
let allPlaces = [];
let map, clusterGroup;
let activeItem = null;
let userLat = null, userLon = null;

// ─── INIT MAP ─────────────────────────────────────────────
function initMap(lat = 51.505, lon = -0.09) {
  if (map) return;
  map = L.map('map', { zoomControl: true }).setView([lat, lon], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false
  });
  map.addLayer(clusterGroup);

  // Hide loading screen
  setTimeout(() => {
    document.getElementById('loading-overlay').classList.add('hide');
  }, 800);
}

// ─── CUSTOM MARKER ICON ───────────────────────────────────
function makeIcon(isVerified) {
  const color = isVerified ? '#C9A84C' : '#7A7265';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 24 14 24s14-14.67 14-24C28 6.27 21.73 0 14 0z"
      fill="${color}" opacity="0.95"/>
    <circle cx="14" cy="14" r="6" fill="#0F0E0C" opacity="0.7"/>
    <text x="14" y="18" text-anchor="middle" fill="${color}" font-size="9"
      font-family="sans-serif" font-weight="bold">H</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [28, 38],
    iconAnchor: [14, 38],
    popupAnchor: [0, -40]
  });
}

// ─── OVERPASS QUERY ───────────────────────────────────────
function buildQuery(lat, lon, radius) {
  return `
    [out:json][timeout:25];
    (
      node["amenity"="restaurant"]["diet:halal"="yes"](around:${radius},${lat},${lon});
      node["amenity"="restaurant"]["cuisine"~"halal|turkish|lebanese|arabic|pakistani|indian|afghan|middle_eastern",i](around:${radius},${lat},${lon});
      node["amenity"="fast_food"]["diet:halal"="yes"](around:${radius},${lat},${lon});
      node["amenity"="fast_food"]["cuisine"~"halal|kebab|shawarma|turkish",i](around:${radius},${lat},${lon});
      node["cuisine"="halal"](around:${radius},${lat},${lon});
      way["amenity"="restaurant"]["diet:halal"="yes"](around:${radius},${lat},${lon});
      way["amenity"="restaurant"]["cuisine"~"halal|turkish|lebanese|arabic|pakistani|indian|afghan",i](around:${radius},${lat},${lon});
    );
    out center tags;
  `;
}

// ─── FETCH & RENDER ───────────────────────────────────────
async function fetchHalal(lat, lon) {
  setStatus('loading', 'Searching for halal restaurants…');
  clearResults();

  try {
    const res = await fetch(OVERPASS_URL, {
      method: 'POST',
      body: 'data=' + encodeURIComponent(buildQuery(lat, lon, searchRadius))
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    processResults(data.elements, lat, lon);
  } catch (e) {
    setStatus('err', 'Failed to fetch — check connection');
    showEmpty(true);
  }
}

function processResults(elements, userLat, userLon) {
  // Deduplicate by name+position
  const seen = new Set();
  allPlaces = elements.map(el => {
    const lat = el.lat ?? el.center?.lat;
    const lon = el.lon ?? el.center?.lon;
    if (!lat || !lon) return null;
    const key = `${el.tags?.name}-${Math.round(lat*1000)}-${Math.round(lon*1000)}`;
    if (seen.has(key) || !el.tags?.name) return null;
    seen.add(key);

    const dist = haversine(userLat, userLon, lat, lon);
    const cuisine = el.tags?.cuisine || '';
    const isVerified = el.tags?.['diet:halal'] === 'yes';
    return { lat, lon, tags: el.tags, dist, cuisine, isVerified, id: el.id };
  }).filter(Boolean).sort((a, b) => a.dist - b.dist);

  if (allPlaces.length === 0) {
    setStatus('ok', 'No results found in this area');
    showEmpty(true);
    return;
  }

  setStatus('ok', `${allPlaces.length} halal spots found`);
  document.getElementById('count-label').textContent = `${allPlaces.length} results`;
  renderFiltered();
}

function renderFiltered() {
  let filtered = allPlaces;
  if (activeFilter !== 'all') {
    filtered = allPlaces.filter(p => {
      const c = (p.cuisine || '').toLowerCase();
      if (activeFilter === 'other') {
        const known = ['indian','turkish','lebanese','pakistani','arabic','chinese'];
        return !known.some(k => c.includes(k));
      }
      return c.includes(activeFilter);
    });
  }

  clearMarkers();
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';
  showEmpty(filtered.length === 0);
  document.getElementById('count-label').textContent = `${filtered.length} results`;

  filtered.forEach((place, i) => {
    // Marker
    const marker = L.marker([place.lat, place.lon], { icon: makeIcon(place.isVerified) });
    marker.bindPopup(makePopup(place), { maxWidth: 320 });
    marker.on('click', () => highlightItem(i));
    clusterGroup.addLayer(marker);
    markers.push({ marker, place });

    // List item
    const item = document.createElement('div');
    item.className = 'result-item';
    item.dataset.index = i;
    item.innerHTML = `
      <div class="result-name">${esc(place.tags.name)}</div>
      <div class="result-meta">
        <span class="tag halal">✦ Halal${place.isVerified ? ' Verified' : ''}</span>
        ${cuisineTag(place.cuisine)}
      </div>
      ${place.tags['addr:street'] ? `<div class="result-addr">📍 ${esc(place.tags['addr:housenumber'] || '')} ${esc(place.tags['addr:street'] || '')}</div>` : ''}
      <div class="result-dist">${distStr(place.dist)}</div>
    `;
    item.onclick = () => {
      highlightItem(i);
      marker.openPopup();
      map.flyTo([place.lat, place.lon], Math.max(map.getZoom(), 16), { duration: 0.8 });
    };
    resultsEl.appendChild(item);
  });
}

function makePopup(place) {
  const t = place.tags;
  const name = esc(t.name || 'Restaurant');
  const addr = [t['addr:housenumber'], t['addr:street'], t['addr:city']]
    .filter(Boolean).map(esc).join(' ');
  const phone = t.phone || t['contact:phone'] || '';
  const website = t.website || t['contact:website'] || '';
  const cuisine = formatCuisine(t.cuisine || '');
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${place.lat},${place.lon}`;

  return `<div class="popup-inner">
    <div class="popup-name">${name}</div>
    <div class="popup-halal">✦ Halal${place.isVerified ? ' · Verified' : ''}</div>
    <div class="popup-divider"></div>
    ${cuisine ? `<div class="popup-row"><span class="icon">🍽</span>${cuisine}</div>` : ''}
    ${addr ? `<div class="popup-row"><span class="icon">📍</span>${addr}</div>` : ''}
    ${phone ? `<div class="popup-row"><span class="icon">📞</span><a href="tel:${phone}" style="color:var(--gold-light)">${esc(phone)}</a></div>` : ''}
    ${website ? `<div class="popup-row"><span class="icon">🌐</span><a href="${esc(website)}" target="_blank" rel="noopener" style="color:var(--gold-light)">Website</a></div>` : ''}
    <div class="popup-actions">
      <a class="popup-btn" href="${mapsUrl}" target="_blank" rel="noopener">🗺 Directions</a>
      ${phone ? `<a class="popup-btn" href="tel:${phone}">📞 Call</a>` : ''}
    </div>
  </div>`;
}

// ─── LOCATE ME ────────────────────────────────────────────
function locateMe() {
  setStatus('loading', 'Getting your location…');
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      if (!map) { initMap(userLat, userLon); }
      else { map.flyTo([userLat, userLon], 15, { duration: 1 }); }
      fetchHalal(userLat, userLon);

      // User dot
      L.circleMarker([userLat, userLon], {
        radius: 8, fillColor: '#C9A84C', fillOpacity: 0.9,
        color: '#0F0E0C', weight: 2
      }).addTo(map).bindTooltip('You are here', { permanent: false });
    },
    err => setStatus('err', 'Location access denied'),
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

// ─── SEARCH AREA ──────────────────────────────────────────
async function searchArea() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  setStatus('loading', `Searching for "${q}"…`);

  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await res.json();
    if (!data.length) { setStatus('err', 'Location not found'); return; }
    const { lat, lon } = data[0];
    userLat = parseFloat(lat); userLon = parseFloat(lon);
    if (!map) { initMap(userLat, userLon); }
    else { map.flyTo([userLat, userLon], 15, { duration: 1 }); }
    fetchHalal(userLat, userLon);
  } catch {
    setStatus('err', 'Geocoding failed — check connection');
  }
}

// ─── FILTERS ──────────────────────────────────────────────
function setFilter(btn) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cuisine;
  renderFiltered();
}

// ─── RADIUS ───────────────────────────────────────────────
function updateRadius(val) {
  searchRadius = parseInt(val);
  const km = (searchRadius / 1000).toFixed(1);
  document.getElementById('radius-val').textContent = `${km} km`;
}

// ─── HELPERS ──────────────────────────────────────────────
function setStatus(type, msg) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = msg;
}

function clearMarkers() {
  clusterGroup.clearLayers();
  markers = [];
}

function clearResults() {
  document.getElementById('results').innerHTML = '';
  showEmpty(false);
  clearMarkers();
  allPlaces = [];
  document.getElementById('count-label').textContent = '–';
}

function showEmpty(show) {
  const el = document.getElementById('empty-state');
  const res = document.getElementById('results');
  el.style.display = show ? 'flex' : 'none';
  res.style.display = show ? 'none' : 'block';
}

function highlightItem(index) {
  document.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.result-item[data-index="${index}"]`);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function distStr(m) {
  return m < 1000 ? `${Math.round(m)}m` : `${(m/1000).toFixed(1)}km`;
}

function formatCuisine(c) {
  return c.split(';').map(s => s.trim()).filter(Boolean)
    .map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(', ');
}

function cuisineTag(c) {
  if (!c) return '';
  const label = formatCuisine(c.split(';')[0]);
  return label ? `<span class="tag">${esc(label)}</span>` : '';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Enter key on search
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchArea();
});

// ─── BOOT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  initMap();
  // Auto-locate on load (if permission already granted)
  if (navigator.permissions) {
    navigator.permissions.query({ name: 'geolocation' }).then(result => {
      if (result.state === 'granted') locateMe();
    });
  }
});
</script>
